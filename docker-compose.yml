version: "3.9"

services:
  renalcare:
    build: .
    container_name: renalcare-dev

    ports:
      - "3000:3000"

    env_file:
      - .env
      
    volumes: []

    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: "2"
          memory: "2g"
